services:
  postgres:
    image: postgres:16
    container_name: koz-service-desk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: koz_service_desk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d koz_service_desk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
